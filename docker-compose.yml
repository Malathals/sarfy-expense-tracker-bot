services:
  db:
    image: postgres:16
    container_name: telegram-expense-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_expense_bot
    ports:
      - '5444:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: